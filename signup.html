
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup - Veltroz</title>

    <link rel="stylesheet" href="./css/styles.css">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:
            linear-gradient(
                135deg,
                #0f172a 0%,
                #1e293b 50%,
                #2563eb 100%
            );
            padding:20px;
        }

        .signup-container{
            width:100%;
            max-width:500px;
            background:rgba(255,255,255,0.1);
            backdrop-filter:blur(15px);
            border:1px solid rgba(255,255,255,0.15);
            border-radius:20px;
            padding:40px;
            box-shadow:0 20px 40px rgba(0,0,0,0.25);
        }

        .back-home{
            display:inline-block;
            text-decoration:none;
            color:white;
            margin-bottom:25px;
            font-size:14px;
            transition:0.3s;
        }

        .back-home:hover{
            opacity:0.8;
        }

        .brand{
            text-align:center;
            margin-bottom:30px;
        }

        .brand h1{
            color:white;
            font-size:2rem;
            margin-bottom:8px;
        }

        .brand p{
            color:rgba(255,255,255,0.75);
            font-size:14px;
        }

        .form-title{
            color:white;
            text-align:center;
            margin-bottom:25px;
            font-size:1.6rem;
        }

        input{
            width:100%;
            padding:14px;
            margin-bottom:16px;
            border-radius:10px;
            border:1px solid rgba(255,255,255,0.2);
            background:rgba(255,255,255,0.08);
            color:white;
            outline:none;
            font-size:15px;
        }

        input::placeholder{
            color:rgba(255,255,255,0.6);
        }

        input:focus{
            border-color:#60a5fa;
        }

        button{
            width:100%;
            padding:14px;
            border:none;
            border-radius:10px;
            background:#2563eb;
            color:white;
            font-size:16px;
            font-weight:600;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:#1d4ed8;
            transform:translateY(-2px);
        }

        .login-link{
            text-align:center;
            margin-top:20px;
            color:rgba(255,255,255,0.8);
        }

        .login-link a{
            color:#93c5fd;
            text-decoration:none;
            font-weight:600;
        }

        .login-link a:hover{
            text-decoration:underline;
        }

        @media(max-width:600px){
            .signup-container{
                padding:25px;
            }

            .brand h1{
                font-size:1.7rem;
            }
        }
    </style>
</head>

<body>

<div class="signup-container">

    <a href="./index.html" class="back-home">
        ← Back to Home
    </a>

    <div class="brand">
        <h1>Veltroz</h1>
        <p>AI Solutions & Digital Innovation</p>
    </div>

    <h2 class="form-title">
        Create Your Account
    </h2>

    <input
        type="text"
        id="signupUsername"
        placeholder="Enter your username"
        required
    >

    <input
        type="email"
        id="signupEmail"
        placeholder="Enter your email"
        required
    >

    <input
        type="password"
        id="signupPassword"
        placeholder="Create a password"
        required
    >

    <button onclick="signupUser()">
        Create Account
    </button>

    <p class="login-link">
        Already have an account?
        <a href="./login.html">
            Login Here
        </a>
    </p>

</div>

<script src=./js/auth.js"></script>

</body>
</html>
```
